name: toxic_tracker
description: 今天鸽了吗 - 一款极简作死记录应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  image_picker: ^1.0.7
  share_plus: ^12.0.1
  supabase_flutter: ^2.6.0
  purchases_flutter: ^9.0.0
  connectivity_plus: ^6.0.3
  path_provider: ^2.1.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  home_widget: ^0.7.0
  flutter_tts: ^4.0.2
  audioplayers: ^6.1.0
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/sounds/

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
