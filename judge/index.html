<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行刑官判决台 | 今天鸽了吗</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      font-family: -apple-system, 'PingFang SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 20px;
      border-bottom: 4px solid #000;
      text-align: center;
    }
    header h1 { font-size: 28px; font-weight: 900; letter-spacing: 2px; }
    header p { font-size: 14px; font-weight: 700; color: #555; margin-top: 4px; }

    .card {
      margin: 32px 20px;
      border: 4px solid #000;
      box-shadow: 8px 8px 0 #000;
      max-width: 480px;
      width: calc(100% - 40px);
    }

    .photo-box {
      width: 100%;
      aspect-ratio: 1;
      background: #eee;
      border-bottom: 4px solid #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; }
    .photo-placeholder { font-size: 64px; }

    .info {
      padding: 20px;
      border-bottom: 4px solid #000;
    }
    .label { font-size: 12px; font-weight: 900; color: #888; letter-spacing: 1px; }
    .task-title { font-size: 24px; font-weight: 900; margin-top: 6px; line-height: 1.2; }
    .verdict-prompt { margin-top: 12px; font-size: 16px; font-weight: 700; color: #333; }

    .buttons { display: grid; grid-template-columns: 1fr 1fr; }

    .btn {
      padding: 24px 12px;
      font-size: 20px;
      font-weight: 900;
      border: none;
      cursor: pointer;
    }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-pass { background: #CCFF00; color: #000; border-right: 2px solid #000; }
    .btn-punish { background: #FF3333; color: #fff; border-left: 2px solid #000; }

    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .result-overlay.show { display: flex; }

    .result-box {
      background: #fff;
      border: 4px solid #000;
      box-shadow: 8px 8px 0 #000;
      padding: 40px 32px;
      text-align: center;
      max-width: 320px;
      width: 90%;
    }
    .result-emoji { font-size: 72px; }
    .result-title { font-size: 32px; font-weight: 900; margin-top: 16px; }
    .result-desc { font-size: 16px; font-weight: 700; color: #555; margin-top: 8px; line-height: 1.5; }
    .result-box.punish { border-color: #FF3333; box-shadow: 8px 8px 0 #FF3333; }
  </style>
</head>
<body>

  <header>
    <h1>🙄 行刑官判决台</h1>
    <p>你的死党正在等待你的裁决</p>
  </header>

  <div class="card">
    <div class="photo-box">
      <img id="proof-photo" src="" alt="呈堂证供" style="display:none" />
      <span class="photo-placeholder" id="photo-placeholder">📸</span>
    </div>
    <div class="info">
      <div class="label">罪名</div>
      <div class="task-title" id="task-title">加载中...</div>
      <div class="verdict-prompt">你来决定：这次算过了，还是立刻处刑？</div>
    </div>
    <div class="buttons">
      <button class="btn btn-pass" id="btn-pass" onclick="verdict('pass')">✅ 算他过了</button>
      <button class="btn btn-punish" id="btn-punish" onclick="verdict('punish')">🔥 立刻处刑</button>
    </div>
  </div>

  <div class="result-overlay" id="result-overlay">
    <div class="result-box" id="result-box">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-desc" id="result-desc"></div>
    </div>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://iyziuawpbpyvwhomtjkh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XtedakJDneCB9Lboa4ZhNA_JjTzbaau';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(location.search);
    const verdictId = params.get('verdict');
    const photoUrl = params.get('photo');
    const taskTitle = params.get('task') || '未知任务';

    document.getElementById('task-title').textContent = decodeURIComponent(taskTitle);

    if (photoUrl) {
      const img = document.getElementById('proof-photo');
      img.src = decodeURIComponent(photoUrl);
      img.style.display = 'block';
      document.getElementById('photo-placeholder').style.display = 'none';
    }

    async function verdict(type) {
      // 禁用按钮防止重复点击
      document.getElementById('btn-pass').disabled = true;
      document.getElementById('btn-punish').disabled = true;

      // 更新 Supabase verdicts 表
      if (verdictId) {
        try {
          await sb.from('verdicts').update({ status: type }).eq('id', verdictId);
        } catch (e) {
          console.error('更新判决失败:', e);
        }
      }

      // 显示结果
      const overlay = document.getElementById('result-overlay');
      const box = document.getElementById('result-box');
      const emoji = document.getElementById('result-emoji');
      const title = document.getElementById('result-title');
      const desc = document.getElementById('result-desc');

      if (type === 'pass') {
        emoji.textContent = '😮‍💨';
        title.textContent = '算你走运';
        desc.textContent = '这次就放你一马。\n下次再鸽，别怪我不客气。';
        box.classList.remove('punish');
      } else {
        emoji.textContent = '💀';
        title.textContent = '处刑令已下达';
        desc.textContent = '你的手机正在报警中...\n好好反省30秒，别再犯了。';
        box.classList.add('punish');
      }

      overlay.classList.add('show');
    }
  </script>
</body>
</html>
