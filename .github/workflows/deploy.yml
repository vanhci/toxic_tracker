name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-web:
    name: Deploy Web to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href "/toxic_tracker/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy-web]
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: |
            ## 更新内容

            请查看 [CHANGELOG.md](./CHANGELOG.md) 获取详细更新日志。

            ## 下载

            - Web 版本: https://vanhci.github.io/toxic_tracker/
            - Android APK: 从下方 Artifacts 下载
          draft: false
          prerelease: false
