  <!-- Loading Screen -->
  <style>
    @font-face {
      font-family: 'Noto Color Emoji';
      src: url('https://fonts.gstatic.com/s/notocoloremoji/v15/Yq6P-KqIXTD0t4D9z1ESnKM3-HpFab5s79jHbQ.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Color Emoji', sans-serif;
      background-color: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .loading {
      text-align: center;
      color: #CCFF00;
    }

    .loading-emoji {
      font-size: 64px;
      animation: roll 1.5s ease-in-out infinite;
      display: inline-block;
    }

    .loading-text {
      font-size: 24px;
      font-weight: 900;
      margin-top: 16px;
      letter-spacing: 2px;
    }

    .loading-hint {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    @keyframes roll {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div class="loading" id="loading">
    <div class="loading-emoji">🙄</div>
    <div class="loading-text">今天鸽了吗</div>
    <div class="loading-hint">加载中...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <!-- Remove loading screen after Flutter initializes -->
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.3s ease';
        setTimeout(function() {
          loading.remove();
        }, 300);
      }
    });
  </script>
</body>
